name: Publish to npm and ClawHub

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read       # actions/checkout
      id-token: write      # OIDC for npm trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'              # 24 ships npm 11.x natively (OIDC-ready); 22 ships npm 10.x
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json both at $PKG_VERSION"

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm publish --access public

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate with ClawHub
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to ClawHub
        run: |
          clawhub package publish "$PWD" \
            --family code-plugin \
            --source-repo "$GITHUB_REPOSITORY" \
            --source-commit "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --version "${GITHUB_REF#refs/tags/v}"
